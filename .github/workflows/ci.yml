name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SCHEME: HotkeyClash

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The app uses Swift 6.2 features (nonisolated on types,
      # SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor), so pick the newest installed
      # Xcode rather than the image default, which can lag behind.
      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_*.app | grep -vi beta | sort -V | tail -1)"
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
          swift --version

      # `xcodebuild test` builds the app and the HotkeyClashTests target, then runs
      # the unit tests (Conflict classification, conflict detection, AX mapping). It
      # builds too, so this single step covers the old build check as well.
      - name: Build & Test
        run: |
          xcodebuild test \
            -project HotkeyClash.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO
